name: CI

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC — used only by the miri job

jobs:
  # Lint: formatting and clippy checks. Runs on every push/PR.
  lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  # Integration tests: runs the full Rust test suite. Runs on every push/PR.
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  # Miri (UB checker): runs on schedule only (daily 6am UTC).
  # Skips if no new commits since the last successful run.
  # Does NOT run on push/PR to avoid blocking workflows with its 30+ min runtime.
  miri:
    if: github.repository_owner == 'MaxOhn' && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Check if changes since last miri run
        id: check
        run: |
          LAST=$(cat .last-miri-run 2>/dev/null || echo "")
          if [ "$LAST" = "$(git rev-parse HEAD)" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - run: cargo miri setup
      - run: cargo miri test
        if: steps.check.outputs.skip != 'true'
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-strict-provenance"
      - name: Record last successful run
        if: steps.check.outputs.skip != 'true' && success()
        run: git rev-parse HEAD > .last-miri-run

  # Header generation: regenerates rosu_pp.h via cheadergen.
  # Auto-commits changes if the header differs. Runs on every push/PR.
  headers:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-06-04
          components: rust-docs-json
      - run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/LukeMathWalker/cheadergen/releases/download/0.3.0/cheadergen_cli-installer.sh | sh
      - run: export PATH="$HOME/.cargo/bin:$PATH" && bash scripts/generate-headers.sh
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: regenerate C headers"

  # C smoke test: compiles tests/c/smoke.c with strict warnings under C99/C11/C17.
  # Verifies the generated header has the expected API shape. Runs on every push/PR.
  smoke-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: headers
    steps:
      - uses: actions/checkout@v6
      - run: cc -std=c99 -Wall -Wextra -Wpedantic -fsyntax-only -I include tests/c/smoke.c
      - run: cc -std=c11 -Wall -Wextra -Wpedantic -fsyntax-only -I include tests/c/smoke.c
      - run: cc -std=c17 -Wall -Wextra -Wpedantic -fsyntax-only -I include tests/c/smoke.c

  # Cross-platform build: builds the cdylib/staticlib for each target.
  # Only runs on tag pushes (releases).
  build:
    needs: [lint, test, headers, smoke-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: librosu_pp_ffi.so
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: librosu_pp_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rosu_pp_ffi.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  # Release: publishes artifacts to GitHub Releases.
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - uses: softprops/action-gh-release@v3
        with:
          files: "**/*.so,**/*.dylib,**/*.dll"
          draft: false
          prerelease: false
